<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alternative AR Menu</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- AR.js A-Frame component -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
    #ui {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(15, 15, 15, 0.9);
      color: white;
      padding: 15px 20px;
      border-radius: 12px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      border: 1px solid #333;
    }
    a.btn {
      display: inline-block;
      margin-top: 10px;
      background: #333;
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h3 style="margin: 0 0 8px 0; font-size: 1.1rem;">📷 Universal AR Mode</h3>
    <p style="margin: 0 0 10px 0; font-size: 0.9rem; color: #bbb;">Point your camera at a <strong>Hiro Marker</strong> (search "hiro marker" on another screen).</p>
    <a href="index.html" class="btn">Back to Menu</a>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-assets>
      <a-asset-item id="burger" src="burger.glb"></a-asset-item>
    </a-assets>

    <!-- The Hiro marker -->
    <a-marker preset="hiro">
      <!-- We scale it up so it's visible. You can adjust this later. -->
      <a-entity gltf-model="#burger" scale="15 15 15" position="0 0 0"></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>

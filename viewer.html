<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Menu — 3D Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #080808;
      color: #fff;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    /* ── Ambient glow behind the model ── */
    .ambient-glow {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vw;
      height: 80vw;
      max-width: 500px;
      max-height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, rgba(245,158,11,0.03) 50%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top bar ── */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      background: linear-gradient(to bottom, rgba(8,8,8,0.95) 0%, transparent 100%);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 1; }
    .back-btn svg { width: 20px; height: 20px; }

    .badge {
      background: rgba(245,158,11,0.15);
      color: #f59e0b;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── 3D Model Viewer ── */
    model-viewer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: transparent;
      --poster-color: transparent;
      --progress-bar-color: #f59e0b;
      --progress-bar-height: 3px;
    }

    /* ── Virtual table surface ── */
    .table-surface {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30vh;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(40, 28, 12, 0.15) 30%,
        rgba(40, 28, 12, 0.35) 60%,
        rgba(30, 20, 8, 0.5) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* ── Floating info card ── */
    .info-card {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding: 0 16px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    .info-inner {
      background: rgba(18, 18, 18, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px 22px;
      max-width: 440px;
      margin: 0 auto;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .dish-name {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .dish-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: #f59e0b;
      white-space: nowrap;
      margin-left: 12px;
    }

    .dish-desc {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .action-row {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:active { transform: scale(0.97); background: #d97706; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 13px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-secondary:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }

    /* ── Gesture hint ── */
    .gesture-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 60;
      text-align: center;
      pointer-events: none;
      animation: fadeOut 3s ease 2s forwards;
    }

    .gesture-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 10px;
      opacity: 0.4;
      animation: gestureSwing 2s ease-in-out infinite;
    }

    .gesture-text {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    @keyframes gestureSwing {
      0%, 100% { transform: rotate(-15deg); }
      50% { transform: rotate(15deg); }
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }

    /* ── Loading state ── */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080808;
      transition: opacity 0.5s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(245,158,11,0.2);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    .loading-text {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Preparing your dish...</div>
  </div>

  <!-- Ambient glow effect -->
  <div class="ambient-glow"></div>

  <!-- Top navigation -->
  <div class="top-bar">
    <a href="index.html" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      Menu
    </a>
    <span class="badge">Interactive 3D</span>
  </div>

  <!-- 3D Model -->
  <model-viewer
    id="model"
    src="burger.glb"
    alt="A 3D model of a signature burger"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="12deg"
    shadow-intensity="1.5"
    shadow-softness="0.8"
    exposure="1.1"
    environment-image="neutral"
    camera-orbit="30deg 70deg 2.5m"
    min-camera-orbit="auto auto 1m"
    max-camera-orbit="auto auto 6m"
    field-of-view="30deg"
    interaction-prompt="none"
    loading="eager"
    tone-mapping="commerce">
  </model-viewer>

  <!-- Virtual table surface -->
  <div class="table-surface"></div>

  <!-- Gesture hint -->
  <div class="gesture-hint">
    <svg class="gesture-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/>
      <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/>
      <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/>
      <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
    </svg>
    <div class="gesture-text">Drag to rotate · Pinch to zoom</div>
  </div>

  <!-- Info card -->
  <div class="info-card">
    <div class="info-inner">
      <div class="info-row">
        <span class="dish-name">Signature Burger</span>
        <span class="dish-price">R85</span>
      </div>
      <div class="dish-desc">
        Juicy beef patty, melted cheddar, fresh lettuce, tomato &amp; our secret sauce on a toasted brioche bun.
      </div>
      <div class="action-row">
        <button class="btn-primary" onclick="alert('Added to order!')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Add to Order
        </button>
        <a href="camera-ar.html" class="btn-secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3"/></svg>
          Camera
        </a>
      </div>
    </div>
  </div>

  <script>
    const modelViewer = document.getElementById('model');
    const loadingOverlay = document.getElementById('loading');

    modelViewer.addEventListener('load', () => {
      setTimeout(() => loadingOverlay.classList.add('hidden'), 400);
    });

    // Fallback hide loading after 8s
    setTimeout(() => loadingOverlay.classList.add('hidden'), 8000);
  </script>
</body>
</html>

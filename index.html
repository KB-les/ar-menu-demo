<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Menu Demo</title>
  <!-- Import model-viewer from Google's CDN -->
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      text-align: center;
    }
    p.subtitle {
      color: #aaa;
      font-size: 0.95rem;
      margin-bottom: 24px;
      text-align: center;
    }
    .dish-card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #333;
    }
    .dish-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .dish-name { font-size: 1.2rem; font-weight: 600; }
    .dish-price { color: #f59e0b; font-weight: 700; font-size: 1.1rem; }
    .dish-desc {
      color: #bbb;
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    model-viewer {
      width: 100%;
      height: 300px;
      background: #111;
      border-radius: 12px;
      --poster-color: #111;
    }
    .ar-hint {
      text-align: center;
      margin-top: 12px;
      font-size: 0.85rem;
      color: #888;
    }
    .ar-hint span {
      display: inline-block;
      background: #f59e0b;
      color: #000;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.75rem;
      margin-right: 4px;
    }
  </style>
</head>
<body>

  <h1>🍽️ AR Menu</h1>
  <p class="subtitle">Tap the cube icon to place the dish on your table</p>

  <div class="dish-card">
    <div class="dish-header">
      <span class="dish-name">Signature Burger</span>
      <span class="dish-price">R85</span>
    </div>
    <div class="dish-desc">
      Juicy beef patty, melted cheddar, fresh lettuce, tomato, and our secret sauce on a toasted brioche bun.
    </div>

    <!-- THE AR COMPONENT -->
    <model-viewer
      src="burger.glb"
      alt="A 3D model of a signature burger"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      poster="https://modelviewer.dev/assets/poster.png"
      loading="eager">
    </model-viewer>

    <div class="ar-hint">
      <span>AR</span> Tap the cube icon ↗️ to view in your space
    </div>
  </div>

</body>
</html>

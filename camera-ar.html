<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Menu — Camera Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
    }

    /* ── Camera feed ── */
    #camera-feed {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* ── Three.js canvas ── */
    #overlay-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: auto;
    }

    /* ── Top bar ── */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.9;
    }
    .back-btn svg { width: 20px; height: 20px; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 6px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── Bottom controls ── */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 16px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    }

    .bottom-inner {
      max-width: 440px;
      margin: 0 auto;
    }

    .dish-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .dish-name {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .dish-price {
      font-size: 1.15rem;
      font-weight: 800;
      color: #f59e0b;
    }

    .controls-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .ctrl-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ctrl-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.2); }
    .ctrl-btn.active { border-color: #f59e0b; background: rgba(245,158,11,0.15); color: #f59e0b; }
    .ctrl-btn svg { width: 16px; height: 16px; }

    .hint-text {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      padding-bottom: 4px;
    }

    /* ── Error / permission screen ── */
    .error-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080808;
      padding: 40px;
      text-align: center;
    }
    .error-screen.hidden { display: none; }

    .error-icon {
      width: 64px; height: 64px;
      margin-bottom: 20px;
      opacity: 0.4;
    }

    .error-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .error-desc {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .error-btn {
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Crosshair ── */
    .crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      pointer-events: none;
      opacity: 0.25;
    }
    .crosshair-ring {
      width: 60px; height: 60px;
      border: 2px solid #fff;
      border-radius: 50%;
    }
    .crosshair .dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 4px; height: 4px;
      background: #fff;
      border-radius: 50%;
    }

    /* ── Loading ── */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080808;
      transition: opacity 0.5s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(245,158,11,0.2);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    .loading-text {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Opening camera...</div>
  </div>

  <!-- Error screen (hidden by default) -->
  <div class="error-screen hidden" id="error-screen">
    <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
    <div class="error-title">Camera Access Needed</div>
    <div class="error-desc">Please allow camera access to use the Camera Preview mode. You can also use the 3D Viewer instead.</div>
    <a href="viewer.html" class="error-btn">Open 3D Viewer</a>
  </div>

  <!-- Camera video feed -->
  <video id="camera-feed" autoplay playsinline muted></video>

  <!-- Three.js overlay -->
  <canvas id="overlay-canvas"></canvas>

  <!-- Crosshair -->
  <div class="crosshair" id="crosshair" style="display:none;">
    <div class="crosshair-ring"></div>
    <div class="dot"></div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <a href="index.html" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      Menu
    </a>
    <div class="live-badge">
      <div class="live-dot"></div>
      CAMERA
    </div>
  </div>

  <!-- Bottom controls -->
  <div class="bottom-bar">
    <div class="bottom-inner">
      <div class="dish-label">
        <span class="dish-name">Signature Burger</span>
        <span class="dish-price">R85</span>
      </div>
      <div class="controls-row">
        <button class="ctrl-btn active" id="btn-rotate" onclick="toggleRotate()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
          Rotate
        </button>
        <button class="ctrl-btn" id="btn-bigger" onclick="scaleModel(1.2)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          Bigger
        </button>
        <button class="ctrl-btn" id="btn-smaller" onclick="scaleModel(0.8)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          Smaller
        </button>
      </div>
      <div class="hint-text">Drag to move the dish · Use buttons to resize</div>
    </div>
  </div>

  <!-- Three.js via import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── DOM elements ──
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('overlay-canvas');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error-screen');
    const crosshair = document.getElementById('crosshair');

    // ── State ──
    let model = null;
    let autoRotate = true;
    let currentScale = 1;
    let modelBaseScale = new THREE.Vector3(1, 1, 1);

    // ── Three.js setup ──
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene = new THREE.Scene();

    // Perspective camera
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2.5, 4);
    camera.lookAt(0, 0, 0);

    // ── Lighting ──
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const hemisphereLight = new THREE.HemisphereLight(0xffeedd, 0x080820, 0.5);
    scene.add(hemisphereLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(3, 5, 4);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 1024;
    keyLight.shadow.mapSize.height = 1024;
    keyLight.shadow.camera.near = 0.1;
    keyLight.shadow.camera.far = 20;
    keyLight.shadow.camera.left = -5;
    keyLight.shadow.camera.right = 5;
    keyLight.shadow.camera.top = 5;
    keyLight.shadow.camera.bottom = -5;
    keyLight.shadow.bias = -0.002;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffc87c, 0.4);
    fillLight.position.set(-2, 3, -1);
    scene.add(fillLight);

    // ── Shadow-receiving ground plane (invisible, just catches shadows) ──
    const shadowMat = new THREE.ShadowMaterial({ opacity: 0.25 });
    const shadowPlane = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), shadowMat);
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.position.y = -0.01;
    shadowPlane.receiveShadow = true;
    scene.add(shadowPlane);

    // ── Load model ──
    const loader = new GLTFLoader();
    loader.load('burger.glb', (gltf) => {
      model = gltf.scene;

      // Center and scale model
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const desiredSize = 1.8;
      const scaleFactor = desiredSize / maxDim;

      model.scale.setScalar(scaleFactor);
      modelBaseScale.setScalar(scaleFactor);

      // Re-center
      const newBox = new THREE.Box3().setFromObject(model);
      const newCenter = newBox.getCenter(new THREE.Vector3());
      model.position.sub(newCenter);
      model.position.y = -newBox.min.y * (scaleFactor / model.scale.x); // sit on ground

      // Enable shadows
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      scene.add(model);
    }, undefined, (err) => {
      console.error('Model load error:', err);
    });

    // ── Camera setup ──
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        await video.play();
        loadingEl.classList.add('hidden');
        crosshair.style.display = 'block';
      } catch (err) {
        console.error('Camera error:', err);
        loadingEl.classList.add('hidden');
        errorEl.classList.remove('hidden');
      }
    }

    startCamera();

    // ── Touch interaction: drag to move model ──
    let isDragging = false;
    let prevTouch = { x: 0, y: 0 };

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        prevTouch.x = e.touches[0].clientX;
        prevTouch.y = e.touches[0].clientY;
      }
    }, { passive: true });

    canvas.addEventListener('touchmove', (e) => {
      if (!isDragging || !model || e.touches.length !== 1) return;

      const dx = (e.touches[0].clientX - prevTouch.x) / window.innerWidth * 5;
      const dy = (e.touches[0].clientY - prevTouch.y) / window.innerHeight * 5;

      model.position.x += dx;
      model.position.z += dy;

      prevTouch.x = e.touches[0].clientX;
      prevTouch.y = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', () => { isDragging = false; }, { passive: true });

    // ── Mouse interaction (desktop testing) ──
    let isMouseDown = false;
    let prevMouse = { x: 0, y: 0 };

    canvas.addEventListener('mousedown', (e) => {
      isMouseDown = true;
      prevMouse.x = e.clientX;
      prevMouse.y = e.clientY;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isMouseDown || !model) return;
      const dx = (e.clientX - prevMouse.x) / window.innerWidth * 5;
      const dy = (e.clientY - prevMouse.y) / window.innerHeight * 5;
      model.position.x += dx;
      model.position.z += dy;
      prevMouse.x = e.clientX;
      prevMouse.y = e.clientY;
    });

    canvas.addEventListener('mouseup', () => { isMouseDown = false; });

    // ── Render loop ──
    function animate() {
      requestAnimationFrame(animate);

      if (model && autoRotate) {
        model.rotation.y += 0.005;
      }

      renderer.render(scene, camera);
    }

    animate();

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Expose functions to global scope for button onclick ──
    window.toggleRotate = function() {
      autoRotate = !autoRotate;
      document.getElementById('btn-rotate').classList.toggle('active', autoRotate);
    };

    window.scaleModel = function(factor) {
      if (!model) return;
      currentScale *= factor;
      currentScale = Math.max(0.3, Math.min(currentScale, 5));
      model.scale.copy(modelBaseScale).multiplyScalar(currentScale);
    };
  </script>
</body>
</html>

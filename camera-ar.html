<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Menu — Unified Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      touch-action: none;
    }
    
    /* Video feed for fallback mode */
    #camera-feed {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none;
    }

    /* Three.js Canvas */
    #overlay-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      outline: none;
    }

    /* UI Layer - wrapped in a DOM Overlay container for WebXR */
    #ui-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 100;
      pointer-events: none; /* Let touches pass through to canvas by default */
    }

    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: max(16px, env(safe-area-inset-top)) 20px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
      pointer-events: auto;
    }
    .back-btn {
      color: #fff; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 6px;
    }
    .badge {
      background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 6px;
    }
    .badge .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px; padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      pointer-events: auto;
    }
    .dish-info { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .dish-name { font-size: 1.15rem; font-weight: 700; }
    .dish-price { font-size: 1.15rem; font-weight: 800; color: #f59e0b; }
    .controls { display: flex; gap: 10px; margin-bottom: 8px; }
    .btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; gap: 6px;}
    .btn:active { background: rgba(255,255,255,0.2); }
    .hint { text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.5); }

    /* Startup Screen */
    #startup-screen {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.95); z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px; text-align: center; backdrop-filter: blur(10px);
    }
    .start-btn {
      background: #f59e0b; color: #000; border: none; padding: 16px 32px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 24px;
    }
    .startup-desc { color: rgba(255,255,255,0.7); margin-top: 12px; line-height: 1.5; font-size: 0.9rem;}

    /* Fullscreen loading */
    #loading {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #000; z-index: 600; display: flex; align-items: center; justify-content: center; color: #f59e0b; font-weight: 600; transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <div id="loading">Loading Engine...</div>

  <div id="startup-screen">
    <h2>AR Menu Preview</h2>
    <p class="startup-desc">Place the dish on your table to see it in real life.</p>
    <button class="start-btn" id="start-btn">Start AR</button>
  </div>

  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>

  <div id="ui-layer">
    <div class="top-bar">
      <a href="index.html" class="back-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg> Menu</a>
      <div class="badge"><div class="dot"></div> <span id="mode-badge">AR MODE</span></div>
    </div>

    <div class="bottom-bar">
      <div class="dish-info">
        <span class="dish-name">Signature Burger</span>
        <span class="dish-price">R85</span>
      </div>
      <div class="controls">
        <button class="btn" id="btn-reset"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> Reset</button>
      </div>
      <div class="hint" id="interaction-hint">Point at a surface and tap to place</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── DOM ──
    const startBtn = document.getElementById('start-btn');
    const startupScreen = document.getElementById('startup-screen');
    const loadingScreen = document.getElementById('loading');
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('overlay-canvas');
    const hintText = document.getElementById('interaction-hint');
    const modeBadge = document.getElementById('mode-badge');
    const resetBtn = document.getElementById('btn-reset');

    // ── State ──
    let mode = 'none'; // 'xr' | 'gyro'
    let model = null;
    let reticle = null;
    let groundShadow = null;
    let modelPlaced = false;
    let baseScale = 1;
    let currentScale = 1;
    let modelRotationY = 0;

    // WebXR Hit Test
    let hitTestSource = null;
    let hitTestSourceRequested = false;

    // Gyro Fallback
    let deviceOrientation = { alpha: 0, beta: 0, gamma: 0 };
    const gyroCameraOffset = new THREE.Vector3();
    const virtualFloorY = -1.5;

    // ── Three.js Setup ──
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true; // Enabled for WebXR

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(2, 5, 3);
    scene.add(dirLight);

    // Reticle (Ring)
    const ringGeo = new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.8, transparent: true });
    reticle = new THREE.Mesh(ringGeo, ringMat);
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    // Model Container
    const modelGroup = new THREE.Group();
    modelGroup.visible = false;
    scene.add(modelGroup);

    // Ground Shadow (Fake AO for Tier 3)
    const shadowGeo = new THREE.PlaneGeometry(1, 1).rotateX(-Math.PI / 2);
    // Simple radial gradient texture for shadow
    const shadowCanvas = document.createElement('canvas');
    shadowCanvas.width = 128; shadowCanvas.height = 128;
    const ctx = shadowCanvas.getContext('2d');
    const grad = ctx.createRadialGradient(64,64,0, 64,64,64);
    grad.addColorStop(0, 'rgba(0,0,0,0.5)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,128,128);
    const shadowTex = new THREE.CanvasTexture(shadowCanvas);
    const shadowMat = new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, opacity: 0.7, depthWrite: false });
    groundShadow = new THREE.Mesh(shadowGeo, shadowMat);
    groundShadow.position.y = 0.01;
    modelGroup.add(groundShadow);

    // ── Load Model ──
    const loader = new GLTFLoader();
    loader.load('tasty_burger_with_fries.glb', (gltf) => {
      model = gltf.scene;
      
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      
      // Scale to roughly 30cm across
      baseScale = 0.3 / Math.max(size.x, size.z);
      model.scale.setScalar(baseScale);
      
      // Center bottom at origin
      model.position.sub(center).multiplyScalar(baseScale);
      model.position.y = -box.min.y * baseScale;
      
      modelGroup.add(model);
      loadingScreen.style.opacity = '0';
      setTimeout(() => loadingScreen.style.display = 'none', 300);
    });

    // ── Detection & Init ──
    startBtn.addEventListener('click', async () => {
      startupScreen.style.display = 'none';

      // 1. Try Native WebXR
      if (navigator.xr) {
        try {
          const supported = await navigator.xr.isSessionSupported('immersive-ar');
          if (supported) {
            startWebXR();
            return;
          }
        } catch (e) { console.warn("WebXR check failed", e); }
      }

      // 2. Fallback to Gyro + Video
      startGyroFallback();
    });

    // ── Tier 1: WebXR Immersive AR ──
    async function startWebXR() {
      mode = 'xr';
      modeBadge.innerText = 'XR AR';
      
      const sessionInit = {
        requiredFeatures: ['hit-test', 'dom-overlay'],
        domOverlay: { root: document.getElementById('ui-layer') }
      };

      try {
        const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
        renderer.xr.setReferenceSpaceType('local');
        await renderer.xr.setSession(session);
        
        session.addEventListener('end', () => { window.location.reload(); });
        
        renderer.setAnimationLoop(renderXR);
      } catch (e) {
        console.error("Failed to start WebXR", e);
        startGyroFallback(); // Fallback if session fails
      }
    }

    function renderXR(timestamp, frame) {
      if (!frame) return;
      const session = renderer.xr.getSession();

      if (!modelPlaced) {
        if (!hitTestSourceRequested) {
          session.requestReferenceSpace('viewer').then((refSpace) => {
            session.requestHitTestSource({ space: refSpace }).then((source) => {
              hitTestSource = source;
            });
          });
          hitTestSourceRequested = true;
        }

        if (hitTestSource) {
          const refSpace = renderer.xr.getReferenceSpace();
          const hitTestResults = frame.getHitTestResults(hitTestSource);

          if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(refSpace);
            reticle.visible = true;
            reticle.matrix.fromArray(pose.transform.matrix);
          } else {
            reticle.visible = false;
          }
        }
      }

      renderer.render(scene, camera);
    }

    // ── Tier 3: Gyroscope Fallback ──
    async function startGyroFallback() {
      mode = 'gyro';
      modeBadge.innerText = 'GYRO AR';
      video.style.display = 'block';
      renderer.xr.enabled = false;
      
      // Start Camera
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
      } catch (e) {
        alert("Camera permission denied. Cannot start AR.");
        return;
      }

      // Start Gyro (Request permission on iOS)
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const perm = await DeviceOrientationEvent.requestPermission();
          if (perm === 'granted') window.addEventListener('deviceorientation', handleOrientation);
        } catch (e) { console.error(e); }
      } else {
        window.addEventListener('deviceorientation', handleOrientation);
      }

      // Initial virtual setup
      camera.position.set(0, 0, 0);
      renderer.setAnimationLoop(renderGyro);
    }

    function handleOrientation(e) {
      deviceOrientation.alpha = THREE.MathUtils.degToRad(e.alpha || 0);
      deviceOrientation.beta = THREE.MathUtils.degToRad(e.beta || 0);
      deviceOrientation.gamma = THREE.MathUtils.degToRad(e.gamma || 0);
    }

    const zee = new THREE.Vector3(0, 0, 1);
    const euler = new THREE.Euler();
    const q0 = new THREE.Quaternion();
    const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

    function renderGyro() {
      // 1. Update Camera Rotation from Gyro
      euler.set(deviceOrientation.beta, deviceOrientation.alpha, -deviceOrientation.gamma, 'YXZ');
      camera.quaternion.setFromEuler(euler);
      camera.quaternion.multiply(q1);
      camera.quaternion.multiply(q0.setFromAxisAngle(zee, -window.orientation * Math.PI / 180 || 0));

      // 2. Update Virtual Reticle
      if (!modelPlaced) {
        reticle.visible = true;
        // Raycast from camera center to virtual floor (y = -1.5)
        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
        if (dir.y < -0.1) { // Looking downwards
          const distance = (virtualFloorY - camera.position.y) / dir.y;
          const point = camera.position.clone().add(dir.multiplyScalar(distance));
          reticle.position.copy(point);
          reticle.rotation.x = -Math.PI / 2;
          reticle.updateMatrix();
        } else {
          // Looking up, push reticle out to fixed distance
          const point = camera.position.clone().add(dir.multiplyScalar(4));
          point.y = virtualFloorY;
          reticle.position.copy(point);
          reticle.updateMatrix();
        }
      }

      renderer.render(scene, camera);
    }

    // ── Unified Interaction ──
    // Place model
    function placeAtReticle() {
      if (!reticle.visible) return;
      modelGroup.position.setFromMatrixPosition(reticle.matrix);
      // Copy rotation but only Y axis to stay flat on floor
      const e = new THREE.Euler().setFromRotationMatrix(reticle.matrix);
      modelGroup.rotation.y = e.y;
      
      modelGroup.visible = true;
      reticle.visible = false;
      modelPlaced = true;
      hintText.innerText = "1-finger rotate · 2-finger scale";
    }

    // Global touch handler
    let touchState = { count: 0, dist: 0, lastX: 0 };
    
    // UI layer shouldn't block touch, but just in case we attach to document
    document.addEventListener('touchstart', (e) => {
      if (e.target.closest('.btn') || e.target.closest('.back-btn')) return; // Ignore UI clicks
      
      if (!modelPlaced) {
        placeAtReticle();
        return;
      }
      
      touchState.count = e.touches.length;
      if (touchState.count === 1) {
        touchState.lastX = e.touches[0].clientX;
      } else if (touchState.count === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchState.dist = Math.sqrt(dx*dx + dy*dy);
      }
    });

    document.addEventListener('touchmove', (e) => {
      if (!modelPlaced || !modelGroup.visible) return;
      
      if (e.touches.length === 1 && touchState.count === 1) {
        // Rotate
        const dx = e.touches[0].clientX - touchState.lastX;
        modelRotationY += dx * 0.01;
        modelGroup.rotation.y = modelRotationY;
        touchState.lastX = e.touches[0].clientX;
      } else if (e.touches.length === 2 && touchState.count === 2) {
        // Scale
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const scaleDelta = dist / touchState.dist;
        
        currentScale *= scaleDelta;
        currentScale = Math.max(0.2, Math.min(currentScale, 3));
        model.scale.setScalar(baseScale * currentScale);
        
        // Scale shadow
        groundShadow.scale.setScalar(currentScale);
        
        touchState.dist = dist;
      }
    });

    // Reset button
    resetBtn.addEventListener('click', () => {
      modelPlaced = false;
      modelGroup.visible = false;
      reticle.visible = true;
      hintText.innerText = "Point at a surface and tap to place";
      currentScale = 1;
      model.scale.setScalar(baseScale);
      groundShadow.scale.setScalar(1);
    });

    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

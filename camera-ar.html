<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Menu — Camera Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
    }

    /* ── Camera feed ── */
    #camera-feed {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* ── Three.js canvas ── */
    #overlay-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: auto;
    }

    /* ── Top bar ── */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.9;
    }
    .back-btn svg { width: 20px; height: 20px; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 6px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── Bottom controls ── */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 16px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    }

    .bottom-inner {
      max-width: 440px;
      margin: 0 auto;
    }

    .dish-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .dish-name {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .dish-price {
      font-size: 1.15rem;
      font-weight: 800;
      color: #f59e0b;
    }

    .controls-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .ctrl-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ctrl-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.2); }
    .ctrl-btn.active { border-color: #f59e0b; background: rgba(245,158,11,0.15); color: #f59e0b; }
    .ctrl-btn svg { width: 16px; height: 16px; }

    .hint-text {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      padding-bottom: 4px;
    }

    /* ── AR Start Screen ── */
    .ar-start-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(10px);
      padding: 40px;
      text-align: center;
      transition: opacity 0.3s;
    }
    .ar-start-screen.hidden { opacity: 0; pointer-events: none; }

    .ar-icon {
      width: 64px; height: 64px;
      margin-bottom: 20px;
    }

    .ar-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .ar-desc {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .ar-btn {
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Crosshair ── */
    .crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      pointer-events: none;
      opacity: 0.5;
    }
    .crosshair-ring {
      width: 60px; height: 60px;
      border: 2px dashed rgba(255,255,255,0.6);
      border-radius: 50%;
    }
    .crosshair .dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 6px; height: 6px;
      background: #f59e0b;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <!-- AR Start Screen (Requires user tap for gyro permissions) -->
  <div class="ar-start-screen" id="ar-start-screen">
    <svg class="ar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    <div class="ar-title">AR Table Tracking</div>
    <div class="ar-desc">Point your phone at a clear table surface and tap Start. We will use your phone's sensors to anchor the food.</div>
    <button class="ar-btn" id="start-ar-btn">Start AR Tracking</button>
  </div>

  <!-- Camera video feed -->
  <video id="camera-feed" autoplay playsinline muted></video>

  <!-- Three.js overlay -->
  <canvas id="overlay-canvas"></canvas>

  <!-- Crosshair -->
  <div class="crosshair" id="crosshair" style="display:none;">
    <div class="crosshair-ring"></div>
    <div class="dot"></div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <a href="index.html" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      Menu
    </a>
    <div class="live-badge">
      <div class="live-dot"></div>
      CAMERA
    </div>
  </div>

  <!-- Bottom controls -->
  <div class="bottom-bar">
    <div class="bottom-inner">
      <div class="dish-label">
        <span class="dish-name">Signature Burger</span>
        <span class="dish-price">R85</span>
      </div>
      <div class="controls-row">
        <button class="ctrl-btn active" id="btn-place" onclick="placeModel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Re-Center
        </button>
        <button class="ctrl-btn" id="btn-bigger" onclick="scaleModel(1.2)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          Bigger
        </button>
        <button class="ctrl-btn" id="btn-smaller" onclick="scaleModel(0.8)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          Smaller
        </button>
      </div>
      <div class="hint-text">Move your phone around to see all angles</div>
    </div>
  </div>

  <!-- Three.js via import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── DOM elements ──
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('overlay-canvas');
    const arStartScreen = document.getElementById('ar-start-screen');
    const startArBtn = document.getElementById('start-ar-btn');
    const crosshair = document.getElementById('crosshair');

    // ── State ──
    let model = null;
    let currentScale = 1;
    let modelBaseScale = new THREE.Vector3(1, 1, 1);
    
    // Gyroscope state
    let deviceOrientation = { alpha: 0, beta: 0, gamma: 0 };
    let initialOrientation = null;
    let isTracking = false;

    // ── Three.js setup ──
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene = new THREE.Scene();

    // Perspective camera
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 0); // Camera at origin for gyro

    // Anchor group that holds the model (placed in front of camera)
    const anchorGroup = new THREE.Group();
    anchorGroup.position.set(0, 0, -4); // 4 meters in front initially
    scene.add(anchorGroup);

    // ── Lighting ──
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const hemisphereLight = new THREE.HemisphereLight(0xffeedd, 0x080820, 0.5);
    scene.add(hemisphereLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(3, 5, 4);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffc87c, 0.4);
    fillLight.position.set(-2, 3, -1);
    scene.add(fillLight);

    // ── Load model ──
    const loader = new GLTFLoader();
    loader.load('tasty_burger_with_fries.glb', (gltf) => {
      model = gltf.scene;

      // Center and scale model
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const desiredSize = 2.0; // Size in 3D units
      const scaleFactor = desiredSize / maxDim;

      model.scale.setScalar(scaleFactor);
      modelBaseScale.setScalar(scaleFactor);

      // Re-center
      const newBox = new THREE.Box3().setFromObject(model);
      const newCenter = newBox.getCenter(new THREE.Vector3());
      model.position.sub(newCenter);

      // Add to anchor group
      anchorGroup.add(model);
    }, undefined, (err) => {
      console.error('Model load error:', err);
    });

    // ── Camera setup ──
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        await video.play();
      } catch (err) {
        console.error('Camera error:', err);
      }
    }

    // ── Device Orientation (Gyroscope) ──
    function onDeviceOrientation(event) {
      deviceOrientation = {
        alpha: THREE.MathUtils.degToRad(event.alpha || 0), // Z-axis rotation
        beta: THREE.MathUtils.degToRad(event.beta || 0),   // X-axis rotation
        gamma: THREE.MathUtils.degToRad(event.gamma || 0)  // Y-axis rotation
      };
      
      if (!initialOrientation && event.alpha !== null) {
        initialOrientation = { ...deviceOrientation };
        placeModel(); // Automatically place when first receiving data
      }
    }

    startArBtn.addEventListener('click', async () => {
      // Request permission on iOS 13+
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permissionState = await DeviceOrientationEvent.requestPermission();
          if (permissionState === 'granted') {
            window.addEventListener('deviceorientation', onDeviceOrientation);
          } else {
            alert("Gyroscope access is required for AR tracking.");
          }
        } catch (e) {
          console.error(e);
        }
      } else {
        // Non-iOS or older devices
        window.addEventListener('deviceorientation', onDeviceOrientation);
      }
      
      startCamera();
      arStartScreen.classList.add('hidden');
      crosshair.style.display = 'block';
      isTracking = true;
    });

    // Calculates Three.js quaternion from device orientation
    const zee = new THREE.Vector3(0, 0, 1);
    const euler = new THREE.Euler();
    const q0 = new THREE.Quaternion();
    const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // - PI/2 around x-axis

    function updateCameraRotation() {
      if (!isTracking) return;
      
      euler.set(deviceOrientation.beta, deviceOrientation.alpha, -deviceOrientation.gamma, 'YXZ');
      camera.quaternion.setFromEuler(euler);
      camera.quaternion.multiply(q1); // orient to camera view
      camera.quaternion.multiply(q0.setFromAxisAngle(zee, -window.orientation * Math.PI / 180 || 0)); // screen orientation
    }

    // ── Render loop ──
    function animate() {
      requestAnimationFrame(animate);
      updateCameraRotation();
      renderer.render(scene, camera);
    }
    animate();

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Expose functions to global scope ──
    window.placeModel = function() {
      // Move the anchor group exactly 4 meters in front of the current camera look direction
      const distance = 4;
      const cameraDirection = new THREE.Vector3(0, 0, -1);
      cameraDirection.applyQuaternion(camera.quaternion);
      cameraDirection.normalize();
      
      anchorGroup.position.copy(camera.position).add(cameraDirection.multiplyScalar(distance));
      
      // Flash the crosshair to indicate placement
      crosshair.style.opacity = '1';
      setTimeout(() => crosshair.style.opacity = '0.5', 200);
    };

    window.scaleModel = function(factor) {
      if (!model) return;
      currentScale *= factor;
      currentScale = Math.max(0.3, Math.min(currentScale, 5));
      model.scale.copy(modelBaseScale).multiplyScalar(currentScale);
    };
  </script>
</body>
</html>

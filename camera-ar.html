<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Menu — Live Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow: hidden; }

    #camera-feed {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover; z-index: 0; display: none;
    }
    #overlay-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 10; pointer-events: none;
    }
    #touch-surface {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 50; touch-action: none;
    }
    #ui-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 100;
      pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
    }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: max(16px, env(safe-area-inset-top)) 20px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      pointer-events: auto;
    }
    .back-btn { color: #fff; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .live-badge { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: blink 1.5s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .bottom-bar {
      padding: 16px; padding-bottom: max(24px, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      pointer-events: auto;
    }
    .dish-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .dish-name { font-size: 1.1rem; font-weight: 700; }
    .dish-price { font-size: 1.1rem; font-weight: 800; color: #f59e0b; }
    .controls { display: flex; gap: 10px; margin-bottom: 8px; }
    .ctrl-btn {
      flex: 1; padding: 11px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
      color: #fff; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.85rem;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.2); }
    .ctrl-btn.primary { background: #f59e0b; color: #000; border-color: #f59e0b; }
    .ctrl-btn.primary:active { background: #d97706; }
    .hint { text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.45); }

    /* Startup Screen */
    #startup-screen {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(8,8,8,0.97); z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px; text-align: center;
      transition: opacity 0.4s;
    }
    #startup-screen.hidden { opacity: 0; pointer-events: none; }
    #startup-screen h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .screen-desc { color: rgba(255,255,255,0.65); line-height: 1.5; font-size: 0.9rem; margin-top: 8px; }
    .progress-wrap { width: 180px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 24px; overflow: hidden; }
    #progress-bar { height: 100%; width: 0%; background: #f59e0b; transition: width 0.15s; border-radius: 4px; }
    #start-btn {
      display: none; margin-top: 24px;
      background: #f59e0b; color: #000; border: none;
      padding: 15px 32px; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #error-msg { color: #ef4444; margin-top: 16px; font-size: 0.9rem; display: none; }

    /* Cart badge */
    .cart-badge {
      position: absolute; top: max(16px, env(safe-area-inset-top)); right: 20px;
      z-index: 200; background: rgba(245,158,11,0.9); color: #000;
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; pointer-events: auto; cursor: pointer;
    }
    .cart-badge:empty { display: none; }
  </style>
</head>
<body>

  <div id="startup-screen">
    <h2 id="startup-title">🍔 AR Menu Preview</h2>
    <p class="screen-desc" id="screen-desc">Loading 3D model...</p>
    <div class="progress-wrap"><div id="progress-bar"></div></div>
    <button id="start-btn">Start AR</button>
    <p id="error-msg"></p>
  </div>

  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>
  <div id="touch-surface"></div>

  <div id="ui-layer">
    <div class="top-bar">
      <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Menu
      </a>
      <div class="live-badge"><div class="live-dot"></div>CAMERA</div>
    </div>
    <div class="bottom-bar">
      <div class="dish-info">
        <span class="dish-name" id="dish-name">Signature Burger</span>
        <span class="dish-price" id="dish-price">R85</span>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="btn-reset">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Reset
        </button>
        <button class="ctrl-btn" id="btn-bigger">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          Bigger
        </button>
        <button class="ctrl-btn" id="btn-smaller">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          Smaller
        </button>
        <button class="ctrl-btn primary" id="btn-add">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Add
        </button>
      </div>
      <div class="hint" id="hint-text">Point camera at surface · Tap to place</div>
    </div>
  </div>

  <div class="cart-badge" id="cart-badge" onclick="location.href='index.html'"></div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ═══════════════════════════════════════════════════════════════════════
    // 1. DISH DATA & ROUTING
    // ═══════════════════════════════════════════════════════════════════════
    const DISHES = {
      burger: { name: 'Signature Burger', price: 85, model: 'tasty_burger_with_fries.glb', emoji: '🍔' },
      pizza:  { name: 'Margherita Pizza',  price: 95, model: 'pizza.glb', emoji: '🍕' },
      sushi:  { name: 'Sushi Platter',     price: 145, model: 'sushi.glb', emoji: '🍣' }
    };

    const params = new URLSearchParams(window.location.search);
    const dishId = DISHES[params.get('dish')] ? params.get('dish') : 'burger';
    const dish = DISHES[dishId];

    // Update UI immediately
    document.getElementById('dish-name').innerText = dish.name;
    document.getElementById('dish-price').innerText = `R${dish.price}`;
    document.getElementById('startup-title').innerText = `${dish.emoji} AR Menu Preview`;

    // ═══════════════════════════════════════════════════════════════════════
    // 2. DOM & STATE
    // ═══════════════════════════════════════════════════════════════════════
    const $id = id => document.getElementById(id);
    const dom = {
      startup:    $id('startup-screen'),
      desc:       $id('screen-desc'),
      progress:   $id('progress-bar'),
      startBtn:   $id('start-btn'),
      errorMsg:   $id('error-msg'),
      video:      $id('camera-feed'),
      canvas:     $id('overlay-canvas'),
      touch:      $id('touch-surface'),
      hint:       $id('hint-text'),
      resetBtn:   $id('btn-reset'),
      biggerBtn:  $id('btn-bigger'),
      smallerBtn: $id('btn-smaller'),
      addBtn:     $id('btn-add'),
      cartBadge:  $id('cart-badge'),
    };

    let model = null;
    let modelBaseScale = 1;
    let modelScale = 1;
    let modelPlaced = false;
    let modelRotY = 0;
    const VIRTUAL_FLOOR_Y = -1.2;

    // ═══════════════════════════════════════════════════════════════════════
    // 3. CART
    // ═══════════════════════════════════════════════════════════════════════
    function getCart() {
      try { return JSON.parse(localStorage.getItem('arMenuCart') || '[]'); }
      catch (e) { return []; }
    }
    function saveCart(cart) {
      localStorage.setItem('arMenuCart', JSON.stringify(cart));
    }
    function updateCartBadge() {
      const cart = getCart();
      const count = cart.length;
      dom.cartBadge.innerText = count > 0 ? count : '';
      dom.cartBadge.style.display = count > 0 ? 'flex' : 'none';
    }
    function addToCart() {
      const cart = getCart();
      cart.push({ id: dishId, name: dish.name, price: dish.price, addedAt: Date.now() });
      saveCart(cart);
      updateCartBadge();
      if (navigator.vibrate) navigator.vibrate(40);
      // Flash feedback
      const originalText = dom.addBtn.innerHTML;
      dom.addBtn.innerHTML = '✓ Added';
      setTimeout(() => dom.addBtn.innerHTML = originalText, 1200);
    }
    dom.addBtn.addEventListener('click', addToCart);
    updateCartBadge();

    // ═══════════════════════════════════════════════════════════════════════
    // 4. THREE.JS SETUP
    // ═══════════════════════════════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ canvas: dom.canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.9;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 30);

    // ── Lighting ──
    scene.add(new THREE.AmbientLight(0xfff8f0, 0.5));

    const keyLight = new THREE.DirectionalLight(0xfff5e6, 1.4);
    keyLight.position.set(-3, 5, 2);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);        // ← sharper shadows
    keyLight.shadow.camera.near = 0.1;
    keyLight.shadow.camera.far = 12;
    keyLight.shadow.camera.left = -2;
    keyLight.shadow.camera.right = 2;
    keyLight.shadow.camera.top = 2;
    keyLight.shadow.camera.bottom = -2;
    keyLight.shadow.bias = -0.001;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xd0e8ff, 0.45);
    fillLight.position.set(3, 3, -1);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
    rimLight.position.set(0, 1, -4);
    scene.add(rimLight);

    // ── Reticle ──
    const reticleGeo = new THREE.RingGeometry(0.12, 0.17, 32);
    reticleGeo.rotateX(-Math.PI / 2);
    const reticleMesh = new THREE.Mesh(
      reticleGeo,
      new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.75, transparent: true, side: THREE.DoubleSide })
    );
    reticleMesh.visible = false;
    scene.add(reticleMesh);

    // ── Model Group ──
    const modelGroup = new THREE.Group();
    modelGroup.visible = false;
    scene.add(modelGroup);

    // ── Grounding System ──

    // 1. Real shadow-receiver plane
    const groundPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10).rotateX(-Math.PI / 2),
      new THREE.ShadowMaterial({ opacity: 0.38 })
    );
    groundPlane.receiveShadow = true;
    groundPlane.position.y = -0.004;
    scene.add(groundPlane);

    // 2. Baked directional shadow — darker with contact ring
    const dirShadow = (() => {
      const c = document.createElement('canvas'); c.width = c.height = 256;
      const cx = c.getContext('2d');
      cx.save();
      cx.translate(133, 128);
      cx.scale(1.0, 0.5);
      const grd = cx.createRadialGradient(0, 0, 0, 0, 0, 115);
      grd.addColorStop(0,   'rgba(0,0,0,0.72)');   // ← darker core
      grd.addColorStop(0.40,'rgba(0,0,0,0.38)');   // ← stronger mid
      grd.addColorStop(1,   'rgba(0,0,0,0)');
      cx.fillStyle = grd;
      cx.beginPath();
      cx.arc(0, 0, 115, 0, Math.PI * 2);
      cx.fill();
      // Sharp contact ring
      cx.beginPath();
      cx.arc(0, 0, 118, 0, Math.PI * 2);
      cx.lineWidth = 2.5;
      cx.strokeStyle = 'rgba(0,0,0,0.32)';
      cx.stroke();
      cx.restore();
      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(0.42, 0.42).rotateX(-Math.PI / 2),
        new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false, opacity: 0.9 })
      );
      mesh.position.set(0.02, 0.002, 0.04);
      return mesh;
    })();
    modelGroup.add(dirShadow);
    const shadowDisc = dirShadow;

    // 3. Contact AO ring — darkens where plate meets table
    const aoRing = new THREE.Mesh(
      new THREE.RingGeometry(0.47, 0.53, 64).rotateX(-Math.PI / 2),
      new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.22,
        depthWrite: false
      })
    );
    aoRing.position.y = 0.003;
    modelGroup.add(aoRing);

    // ═══════════════════════════════════════════════════════════════════════
    // 5. MODEL LOADING
    // ═══════════════════════════════════════════════════════════════════════
    let placementAnimating = false;
    let placementAnimStart = 0;
    const PLACEMENT_DURATION = 420;

    new GLTFLoader().load(
      dish.model,
      gltf => {
        model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        const footprint = Math.max(size.x, size.z);
        modelBaseScale = 0.26 / footprint;

        // Set model scale ONCE, never touch it again
        model.scale.setScalar(modelBaseScale);
        model.position.set(
          -center.x * modelBaseScale,
          -box.min.y * modelBaseScale,
          -center.z * modelBaseScale
        );

        model.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        modelGroup.add(model);
        dom.desc.innerText = 'Ready!';
        dom.progress.parentElement.style.display = 'none';
        dom.startBtn.style.display = 'block';
        dom.startBtn.disabled = false;
      },
      xhr => {
        if (xhr.lengthComputable)
          dom.progress.style.width = ((xhr.loaded / xhr.total) * 100) + '%';
      },
      err => {
        console.error(err);
        dom.desc.innerText = 'Failed to load model.';
        dom.progress.parentElement.style.display = 'none';
        dom.errorMsg.innerText = 'Please check your internet connection and refresh.';
        dom.errorMsg.style.display = 'block';
      }
    );

    // ═══════════════════════════════════════════════════════════════════════
    // 6. GYROSCOPE (with full drift compensation)
    // ═══════════════════════════════════════════════════════════════════════
    const gyro = {
      a: 0, b: 0, g: 0,
      driftOffA: 0, driftOffB: 0, driftOffG: 0,
      lastA: 0, lastB: 0, lastG: 0,
      stillAt: null
    };
    let initialAlpha = null;
    const zee = new THREE.Vector3(0, 0, 1);
    const q0 = new THREE.Quaternion();
    const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));
    let gyroRunning = false;

    function onOrientation(e) {
      let rawA = e.alpha;
      const rawB = e.beta || 0;
      const rawG = e.gamma || 0;

      // Handle null alpha (some Samsung devices)
      if (rawA === null) {
        rawA = gyro.lastA;
      } else {
        // Handle relative vs absolute (iOS)
        if (!e.absolute && initialAlpha === null) initialAlpha = rawA;
        if (!e.absolute) rawA -= initialAlpha;
      }

      // Drift compensation on ALL three axes
      const aStable = Math.abs(rawA - gyro.lastA) < 0.05;
      const bStable = Math.abs(rawB - gyro.lastB) < 0.05;
      const gStable = Math.abs(rawG - gyro.lastG) < 0.05;

      if (aStable && bStable && gStable) {
        if (!gyro.stillAt) gyro.stillAt = Date.now();
        else if (Date.now() - gyro.stillAt > 3000) {
          gyro.driftOffA = rawA;
          gyro.driftOffB = rawB;
          gyro.driftOffG = rawG;
        }
      } else {
        gyro.stillAt = null;
      }

      gyro.lastA = rawA;
      gyro.lastB = rawB;
      gyro.lastG = rawG;

      gyro.a = THREE.MathUtils.degToRad(rawA - gyro.driftOffA);
      gyro.b = THREE.MathUtils.degToRad(rawB - gyro.driftOffB);
      gyro.g = THREE.MathUtils.degToRad(rawG - gyro.driftOffG);
    }

    async function enableGyro() {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        const p = await DeviceOrientationEvent.requestPermission().catch(() => 'denied');
        if (p !== 'granted') return false;
      }
      window.addEventListener('deviceorientation', onOrientation);
      gyroRunning = true;
      return true;
    }

    function applyGyroToCamera() {
      const e = new THREE.Euler(gyro.b, gyro.a, -gyro.g, 'YXZ');
      camera.quaternion.setFromEuler(e);
      camera.quaternion.multiply(q1);
      const screenAngle = (screen.orientation?.angle ?? window.orientation ?? 0);
      camera.quaternion.multiply(q0.setFromAxisAngle(zee, -THREE.MathUtils.degToRad(screenAngle)));
    }

    function getCameraDir() {
      return new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
    }

    function floorIntersect() {
      const dir = getCameraDir();
      if (dir.y >= -0.05) return null;
      const t = (VIRTUAL_FLOOR_Y - camera.position.y) / dir.y;
      return camera.position.clone().addScaledVector(dir, t);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 7. RENDER LOOPS
    // ═══════════════════════════════════════════════════════════════════════
    function renderLoop() {
      if (gyroRunning) applyGyroToCamera();
      updatePlacementAnim(performance.now());

      if (!modelPlaced) {
        const hit = floorIntersect();
        if (hit) {
          reticleMesh.position.copy(hit);
          reticleMesh.rotation.set(-Math.PI / 2, 0, 0);
          reticleMesh.visible = true;
        } else {
          reticleMesh.visible = false;
        }
      }

      renderer.render(scene, camera);
    }

    let hitTestSource = null;
    let hitTestRequested = false;

    function renderXR(timestamp, frame) {
      if (!frame) return;
      const session = renderer.xr.getSession();

      if (!modelPlaced) {
        if (!hitTestRequested) {
          session.requestReferenceSpace('viewer').then(vs =>
            session.requestHitTestSource({ space: vs }).then(s => { hitTestSource = s; })
          );
          hitTestRequested = true;
        }
        if (hitTestSource) {
          const refSpace = renderer.xr.getReferenceSpace();
          const results = frame.getHitTestResults(hitTestSource);
          if (results.length > 0) {
            const pose = results[0].getPose(refSpace);
            const m = new THREE.Matrix4().fromArray(pose.transform.matrix);
            reticleMesh.position.setFromMatrixPosition(m);
            reticleMesh.rotation.set(-Math.PI / 2, 0, 0);
            reticleMesh.visible = true;
          } else {
            reticleMesh.visible = false;
          }
        }
      }

      renderer.render(scene, camera);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 8. PLACEMENT & ANIMATION
    // ═══════════════════════════════════════════════════════════════════════
    function easeOutBack(t) {
      const c1 = 1.70158, c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    function placeModel() {
      if (!reticleMesh.visible) return;
      groundPlane.position.set(reticleMesh.position.x, reticleMesh.position.y - 0.004, reticleMesh.position.z);
      modelGroup.position.copy(reticleMesh.position);
      modelGroup.rotation.y = modelRotY;
      modelGroup.scale.setScalar(0); // Start at 0 for bounce-in
      modelGroup.visible = true;
      reticleMesh.visible = false;
      modelPlaced = true;
      placementAnimating = true;
      placementAnimStart = performance.now();
      dom.hint.innerText = '1-finger drag to rotate · 2-finger pinch to scale';
      if (navigator.vibrate) navigator.vibrate([30, 20, 10]);
    }

    function updatePlacementAnim(now) {
      if (!placementAnimating) return;
      const t = Math.min((now - placementAnimStart) / PLACEMENT_DURATION, 1);
      const s = easeOutBack(t);
      modelGroup.scale.setScalar(s * modelScale);
      if (t >= 1) {
        placementAnimating = false;
        modelGroup.scale.setScalar(modelScale);
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 9. TOUCH INTERACTION (fixed gesture lock)
    // ═══════════════════════════════════════════════════════════════════════
    let ts = { count: 0, lastX: 0, dist: 0 };

    dom.touch.addEventListener('touchstart', e => {
      e.preventDefault();
      ts.count = e.touches.length;
      if (!modelPlaced) { placeModel(); return; }
      if (ts.count === 1) ts.lastX = e.touches[0].clientX;
      if (ts.count === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        ts.dist = Math.hypot(dx, dy);
      }
    }, { passive: false });

    dom.touch.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!modelPlaced) return;
      if (e.touches.length === 1 && ts.count === 1) {
        const dx = e.touches[0].clientX - ts.lastX;
        modelRotY += dx * 0.012;
        modelGroup.rotation.y = modelRotY;
        ts.lastX = e.touches[0].clientX;
      } else if (e.touches.length === 2 && ts.count === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const d = Math.hypot(dx, dy);
        const delta = d / ts.dist;
        modelScale = Math.max(0.3, Math.min(modelScale * delta, 4));
        applyModelScale();
        ts.dist = d;
      }
    }, { passive: false });

    // ← FIX: Gesture lock — update count when fingers lift
    dom.touch.addEventListener('touchend', e => {
      ts.count = e.touches.length;
    }, { passive: false });
    dom.touch.addEventListener('touchcancel', e => {
      ts.count = e.touches.length;
    }, { passive: false });

    // ← FIX: Scale only the group, never the model
    function applyModelScale() {
      if (!model) return;
      modelGroup.scale.setScalar(modelScale);
      // model.scale stays at modelBaseScale forever
      // shadowDisc and aoRing are children of modelGroup, scale automatically
    }

    function resetPlacement() {
      modelPlaced = false;
      placementAnimating = false;
      modelGroup.visible = false;
      modelGroup.scale.setScalar(1);   // ← reset group, not model
      reticleMesh.visible = true;
      dom.hint.innerText = 'Point camera at surface · Tap to place';
      modelScale = 1;
      // No need to call applyModelScale — model.scale never changed
    }

    dom.resetBtn.addEventListener('click', resetPlacement);
    dom.biggerBtn.addEventListener('click', () => {
      modelScale = Math.min(modelScale * 1.25, 4);
      applyModelScale();
    });
    dom.smallerBtn.addEventListener('click', () => {
      modelScale = Math.max(modelScale * 0.8, 0.3);
      applyModelScale();
    });

    // ═══════════════════════════════════════════════════════════════════════
    // 10. STARTUP ROUTING
    // ═══════════════════════════════════════════════════════════════════════
    dom.startBtn.addEventListener('click', async () => {
      dom.startup.classList.add('hidden');

      if (navigator.xr) {
        try {
          const ok = await navigator.xr.isSessionSupported('immersive-ar');
          if (ok) {
            const session = await navigator.xr.requestSession('immersive-ar', {
              requiredFeatures: ['hit-test'],
              optionalFeatures: ['dom-overlay'],   // ← optional, not required
              domOverlay: { root: document.getElementById('ui-layer') }
            });
            renderer.xr.setReferenceSpaceType('local');
            await renderer.xr.setSession(session);
            session.addEventListener('end', () => {
              renderer.xr.setSession(null);
              startGyroMode();
            });
            renderer.setAnimationLoop(renderXR);
            return;
          }
        } catch (e) { console.warn('WebXR failed, falling back:', e); }
      }

      startGyroMode();
    });

    async function startGyroMode() {
      dom.video.style.display = 'block';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        dom.video.srcObject = stream;
        window.addEventListener('beforeunload', () => stream.getTracks().forEach(t => t.stop()));
      } catch (e) {
        console.warn('No camera:', e);
        dom.video.style.display = 'none';
      }
      await enableGyro();
      renderer.setAnimationLoop(renderLoop);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // 11. RESIZE
    // ═══════════════════════════════════════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
